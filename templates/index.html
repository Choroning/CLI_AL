{% extends "base.html" %}

{% block title %}문서 변환기 — PURI{% endblock %}

{% block before_container %}
<!-- ── 히스토리 드롭다운 ── -->
<div class="history-dropdown" id="history-dropdown" style="display:none;" role="dialog" aria-label="최근 기록">
  <div class="history-header">
    <span>최근 기록</span>
    <button onclick="clearHistory()" style="background:none;border:none;color:#a3a3a3;cursor:pointer;font-size:0.75rem;font-weight:600;font-family:inherit;" aria-label="최근 기록 전체 삭제">전체 삭제</button>
  </div>
  <div id="history-list"></div>
</div>
{% endblock %}

{% block body %}
<!-- ── 툴 섹션 ── -->
<div id="main-content">
  <div class="app-layout">

    <!-- 입력 컬럼 -->
    <div class="app-col app-col-input reveal">

      <div class="app-col-head">
        <span class="app-col-label">INPUT</span>
        <div class="app-col-actions">
          <button class="app-action-btn" id="history-btn" onclick="toggleHistory()" aria-label="최근 기록 보기">최근 기록</button>
          <button class="app-clear-btn" id="clear-btn" aria-label="입력 초기화">✕</button>
        </div>
      </div>

      <textarea id="document-input"
        placeholder="공문서, 계약서, 약관, 의료 안내문을 붙여넣거나 파일로 업로드하세요.

예: 제1조 (목적) 이 계약은 갑과 을 사이의 용역 제공에 관한 제반 사항을 규정함을 목적으로 한다..."
        aria-label="문서 입력"></textarea>

      <div class="input-footer">
        <div class="detail-toggle" style="margin-top:0;">
          <span class="detail-label">요약 수준</span>
          <div class="detail-options" role="group" aria-label="요약 수준 선택">
            <button class="detail-btn" data-level="brief" onclick="setDetailLevel('brief')">간단히</button>
            <button class="detail-btn active" data-level="normal" onclick="setDetailLevel('normal')">기본</button>
            <button class="detail-btn" data-level="detailed" onclick="setDetailLevel('detailed')">자세히</button>
          </div>
        </div>
        <div class="lang-select-wrap">
          <label class="detail-label" for="output-lang">언어</label>
          <select id="output-lang" class="lang-select" aria-label="출력 언어 선택">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="vi">Tiếng Việt</option>
            <option value="ja">日本語</option>
          </select>
        </div>
        <span class="char-count" id="char-count" aria-live="polite">0 / 10,000자</span>
      </div>

      <div class="analyze-action-row">
        <button class="app-file-btn" id="upload-btn" aria-label="파일 업로드 (.txt .pdf .docx .hwp .hwpx)">파일 업로드</button>
        <input type="file" id="file-input" accept=".txt,.pdf,.docx,.hwp,.hwpx" style="display:none" aria-label="파일 선택">
        <button class="btn-analyze" id="analyze-btn" disabled>쉬운말로 변환하기</button>
      </div>

    </div>

    <!-- 결과 컬럼 -->
    <div class="app-col app-col-result reveal reveal-d1">

      <div class="app-col-head">
        <span class="app-col-label">RESULT</span>
        <div id="result-header-actions" style="display:none; gap:6px; align-items:center; flex-wrap:wrap;">
          <button class="app-action-btn" id="diff-btn" onclick="toggleDiff()" aria-label="원문과 변환 결과 나란히 비교">원문 비교</button>
          <button class="app-action-btn" id="tts-btn" onclick="toggleTTS()" aria-label="변환 결과 음성으로 읽기">🔊 읽기</button>
          <button class="app-action-btn" onclick="printResult()" aria-label="변환 결과 PDF로 저장">PDF</button>
          <button class="app-action-btn" onclick="copyResult()">복사</button>
        </div>
      </div>

      <div id="result-area">
        <div class="result-empty">
          <div class="empty-icon">↑</div>
          <p>문서를 입력하고<br>변환하기를 눌러주세요</p>
        </div>
      </div>

    </div>

  </div>

  <!-- 챗 패널 (분석 후 표시) -->
  <div class="chat-wrap" id="chat-panel" style="display:none;">
    <div class="chat-panel-inner">
      <div class="app-col-head" style="margin-bottom:16px;">
        <span class="app-col-label">Q&amp;A</span>
        <button class="app-action-btn" onclick="clearChat()">초기화</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-hint">
          이 문서에 대해 궁금한 점을 물어보세요.<br>
          예: <em>"계약 해지하려면 어떻게 해야 하나요?"</em>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="문서에 대해 궁금한 점을 입력하세요..." maxlength="500">
        <button class="btn btn-primary" id="chat-send-btn">전송</button>
      </div>
    </div>
  </div>

</div>

<!-- ── 단어 풀이 모달 ── -->
<div class="tooltip-overlay" id="tooltip-overlay">
  <div class="tooltip-box">
    <button class="tooltip-close" id="tooltip-close">✕</button>
    <div class="tooltip-word" id="tooltip-word"></div>
    <div class="tooltip-explanation" id="tooltip-explanation"></div>
    <div class="tooltip-example" id="tooltip-example"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/main.js"></script>
{% endblock %}
