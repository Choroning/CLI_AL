{% extends "base.html" %}
{% block title %}행정 절차 안내{% endblock %}

{% block before_container %}
<section class="sub-hero">
  <div class="sub-hero-inner">
    <div class="sub-hero-title">행정 절차 안내</div>
    <div class="sub-hero-desc">어디에 가야 하는지, 무엇을 준비해야 하는지 단계별로 알려드립니다.</div>
  </div>
</section>
{% endblock %}

{% block body %}
<div id="procedure-tool">
  <div class="app-layout">

    <div class="app-col app-col-input reveal">
      <div class="app-col-head">
        <span class="app-col-label">INPUT</span>
      </div>

      <div class="form-row" style="margin-bottom:24px;">
        <label class="form-label">절차 유형</label>
        <div class="civil-type-options" style="flex-wrap:wrap;">
          <button class="civil-type-btn active" data-type="주거·이사" onclick="setProcedureType('주거·이사')">주거·이사</button>
          <button class="civil-type-btn" data-type="가족관계·출생·사망" onclick="setProcedureType('가족관계·출생·사망')">가족관계</button>
          <button class="civil-type-btn" data-type="복지·의료" onclick="setProcedureType('복지·의료')">복지·의료</button>
          <button class="civil-type-btn" data-type="취업·퇴직·실업급여" onclick="setProcedureType('취업·퇴직·실업급여')">취업·퇴직</button>
          <button class="civil-type-btn" data-type="법률·분쟁·신고" onclick="setProcedureType('법률·분쟁·신고')">법률·분쟁</button>
          <button class="civil-type-btn" data-type="사업·창업·폐업" onclick="setProcedureType('사업·창업·폐업')">사업·창업</button>
        </div>
      </div>

      <textarea id="procedure-input" class="civil-textarea"
        placeholder="어떤 상황인지 구체적으로 알려주세요.

예: 다음달 서울에서 경기도로 이사를 가는데 전입신고를 어떻게 하면 되나요?"
        maxlength="500"></textarea>

      <div class="input-footer" style="border-bottom:none; padding-bottom:0;">
        <span class="char-count" id="procedure-char-count" style="margin-left:auto;">0 / 500자</span>
      </div>

      <button class="btn-analyze" id="procedure-btn">절차 안내받기</button>
    </div>

    <div class="app-col app-col-result reveal reveal-d1">
      <div class="app-col-head">
        <span class="app-col-label">RESULT</span>
        <div id="procedure-result-actions" style="display:none; gap:6px;">
          <button class="app-action-btn" id="procedure-tts-btn" onclick="toggleTTS()">🔊 읽기</button>
          <button class="app-action-btn" onclick="saveProcedure()">저장</button>
          <button class="app-action-btn" onclick="copyProcedure()">복사</button>
          <button class="app-action-btn" onclick="printProcedure()">PDF</button>
        </div>
      </div>

      <div id="procedure-result">
        <div class="result-empty">
          <div class="empty-icon">↑</div>
          <p>상황을 입력하고<br>절차 안내받기를 눌러주세요</p>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/procedure.js"></script>
{% endblock %}
