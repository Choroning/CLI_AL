name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set — skipping. Add it under Settings → Secrets → Actions after Render deploy."
            exit 0
          fi
          code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 "${BACKEND_URL%/}/health" || echo "000")
          echo "HTTP $code"
          cat /tmp/body || true
          [ "$code" = "200" ]
