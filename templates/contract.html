{% extends "base.html" %}
{% block title %}계약서 작성 도우미{% endblock %}

{% block before_container %}
<section class="sub-hero">
  <div class="sub-hero-inner">
    <div class="sub-hero-title">계약서 작성 도우미</div>
    <div class="sub-hero-desc">계약 유형과 상황을 알려주면 공정하고 쉬운 계약서를 만들어 드립니다.</div>
  </div>
</section>
{% endblock %}

{% block body %}
<div id="contract-tool">
  <div class="app-layout">

    <div class="app-col app-col-input reveal">
      <div class="app-col-head">
        <span class="app-col-label">INPUT</span>
      </div>

      <div class="form-row" style="margin-bottom:24px;">
        <label class="form-label">계약 유형</label>
        <div class="civil-type-options">
          <button class="civil-type-btn active" data-type="방·집 임대차 계약" onclick="setContractType('방·집 임대차 계약')">방·집 임대</button>
          <button class="civil-type-btn" data-type="알바·단기 고용 계약" onclick="setContractType('알바·단기 고용 계약')">알바·고용</button>
          <button class="civil-type-btn" data-type="프리랜서 용역 계약" onclick="setContractType('프리랜서 용역 계약')">프리랜서</button>
          <button class="civil-type-btn" data-type="물품 매매·거래 계약" onclick="setContractType('물품 매매·거래 계약')">물품 거래</button>
          <button class="civil-type-btn" data-type="기타 계약" onclick="setContractType('기타 계약')">기타</button>
        </div>
        <button class="rights-hint-btn" onclick="applyContractHint()" style="margin-top:10px;" aria-label="현재 유형의 예시로 채우기">예시 불러오기</button>
      </div>

      <textarea id="contract-input" class="civil-textarea"
        placeholder="계약 내용을 자유롭게 설명해주세요.

예: 서울 관악구 원룸 월세 40만원, 보증금 500만원, 계약기간 1년, 반려동물 있음"
        maxlength="1000"></textarea>

      <div class="input-footer" style="border-bottom:none; padding-bottom:0;">
        <span class="char-count" id="contract-char-count" style="margin-left:auto;">0 / 1,000자</span>
      </div>

      <button class="btn-analyze" id="contract-btn">계약서 만들기</button>
    </div>

    <div class="app-col app-col-result reveal reveal-d1">
      <div class="app-col-head">
        <span class="app-col-label">RESULT</span>
        <div id="contract-result-actions" style="display:none; gap:6px;">
          <button class="app-action-btn" id="contract-tts-btn" onclick="toggleTTS()">🔊 읽기</button>
          <button class="app-action-btn" onclick="saveContract()">저장</button>
          <button class="app-action-btn" onclick="copyContract()">복사</button>
          <button class="app-action-btn" onclick="printContract()">PDF</button>
        </div>
      </div>

      <div id="contract-result">
        <div class="result-empty">
          <div class="empty-icon">↑</div>
          <p>계약 내용을 입력하고<br>계약서 만들기를 눌러주세요</p>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/contract.js"></script>
{% endblock %}
