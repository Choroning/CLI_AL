# Render Blueprint for the FastAPI backend.
# Edits to rootDir, startCommand, healthCheckPath, or envVar names must be
# coordinated with the corresponding Render dashboard settings. See docs/DEPLOY.md.

services:
  - type: web
    name: cli-al-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: UPSTAGE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
