<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FOLIO{% endblock %} — 행정문서 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <a href="/" class="header-logo">
    <span class="logo-mark">FOLIO</span><span class="logo-dot">.</span>
  </a>
</header>

<!-- ── 서비스 네비게이션 ── -->
<nav class="service-nav">
  <div class="nav-inner">
    <a href="/" class="nav-item {{ 'active' if active == 'converter' else '' }}">문서 변환기</a>
    <a href="/welfare" class="nav-item {{ 'active' if active == 'welfare' else '' }}">복지 혜택 매칭</a>
    <a href="/civil" class="nav-item {{ 'active' if active == 'civil' else '' }}">민원 작성 도우미</a>
  </div>
</nav>

{% block before_container %}{% endblock %}

{% block body %}{% endblock %}

<!-- ── 로딩 ── -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">AI가 처리하고 있습니다...</div>
</div>

<!-- ── 토스트 ── -->
<div class="toast" id="toast"></div>

<!-- ── 글자 크기 플로팅 위젯 ── -->
<div class="font-float">
  <button class="font-btn" id="font-float-sm" onclick="setFontSize('sm')" title="글자 작게">A-</button>
  <button class="font-btn" id="font-float-md" onclick="setFontSize('md')" title="기본 크기">A</button>
  <button class="font-btn" id="font-float-lg" onclick="setFontSize('lg')" title="글자 크게">A+</button>
</div>

<script>
(function() {
  const size = localStorage.getItem('fontSize') || 'md';
  document.documentElement.classList.add('font-' + size);
})();

// 스크롤 리빌
document.addEventListener('DOMContentLoaded', () => {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // 플로팅 글자 크기 버튼 active 초기화
  const savedSize = localStorage.getItem('fontSize') || 'md';
  document.querySelectorAll('.font-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${savedSize}'`));
  });
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
