{% extends "base.html" %}

{% block title %}민원 작성 도우미{% endblock %}

{% block before_container %}
<section class="sub-hero">
  <div class="sub-hero-inner">
    <div class="sub-hero-title">민원 작성 도우미</div>
    <div class="sub-hero-desc">상황을 설명하면 AI가 공식 민원 문서를 작성해 드립니다.</div>
  </div>
</section>
{% endblock %}

{% block body %}
<div id="civil-tool">
  <div class="app-layout">

    <!-- 입력 컬럼 -->
    <div class="app-col app-col-input reveal">

      <div class="app-col-head">
        <span class="app-col-label">INPUT</span>
      </div>

      <div class="form-row" style="margin-bottom:24px;">
        <label class="form-label">민원 유형</label>
        <div class="civil-type-options">
          <button class="civil-type-btn active" data-type="신고" onclick="setCivilType('신고')">신고</button>
          <button class="civil-type-btn" data-type="건의" onclick="setCivilType('건의')">건의</button>
          <button class="civil-type-btn" data-type="불만·고충" onclick="setCivilType('불만·고충')">불만·고충</button>
          <button class="civil-type-btn" data-type="정보공개청구" onclick="setCivilType('정보공개청구')">정보공개청구</button>
        </div>
      </div>

      <textarea id="civil-input" class="civil-textarea"
        placeholder="어떤 상황인지 편하게 설명해주세요.

예: 우리 집 앞 골목에 매일 불법 주정차 차량이 있어서 소방차가 못 들어와요."
        maxlength="1000"></textarea>

      <div class="input-footer" style="border-bottom:none; padding-bottom:0;">
        <span class="char-count" id="civil-char-count" style="margin-left:auto;">0 / 1,000자</span>
      </div>

      <button class="btn-analyze" id="civil-btn">민원 작성하기</button>

    </div>

    <!-- 결과 컬럼 -->
    <div class="app-col app-col-result reveal reveal-d1">

      <div class="app-col-head">
        <span class="app-col-label">RESULT</span>
        <div id="civil-result-actions" style="display:none; gap:6px;">
          <button class="app-action-btn" onclick="copyCivil()">복사</button>
          <button class="app-action-btn" onclick="saveCivil()">저장</button>
        </div>
      </div>

      <div id="civil-result">
        <div class="result-empty">
          <div class="empty-icon">↑</div>
          <p>상황을 입력하고<br>민원 작성하기를 눌러주세요</p>
        </div>
      </div>

    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/civil.js"></script>
{% endblock %}
