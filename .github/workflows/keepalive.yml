name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set — skipping. Add it under Settings → Secrets → Actions after Render deploy."
            exit 0
          fi
          url="${BACKEND_URL%/}/health"
          for attempt in 1 2 3; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 90 "$url" || true)
            echo "Attempt $attempt: HTTP ${code:-000}"
            cat /tmp/body 2>/dev/null || true
            echo
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not respond with 200 after 3 attempts — service may be cold-starting."
          exit 1
