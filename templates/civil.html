{% extends "base.html" %}

{% block title %}민원 작성 도우미{% endblock %}

{% block body %}
<div class="container">
  <div class="page-intro">
    <h2 class="page-title">민원 작성 도우미</h2>
    <p class="page-desc">상황을 설명하면 AI가 공식 민원 문서를 작성해 드립니다.</p>
  </div>

  <div class="layout">
    <!-- 입력 패널 -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">📝</span>
        상황 설명
      </div>
      <div class="panel-body">

        <div class="form-row">
          <label class="form-label">민원 유형</label>
          <div class="civil-type-options">
            <button class="civil-type-btn active" data-type="신고" onclick="setCivilType('신고')">🚨 신고</button>
            <button class="civil-type-btn" data-type="건의" onclick="setCivilType('건의')">💡 건의</button>
            <button class="civil-type-btn" data-type="불만·고충" onclick="setCivilType('불만·고충')">😤 불만·고충</button>
            <button class="civil-type-btn" data-type="정보공개청구" onclick="setCivilType('정보공개청구')">📂 정보공개청구</button>
          </div>
        </div>

        <div class="form-row" style="margin-top:16px;">
          <label class="form-label">상황 설명</label>
          <textarea id="civil-input" class="civil-textarea"
            placeholder="어떤 상황인지 편하게 설명해주세요.

예시:
• 우리 집 앞 골목에 매일 불법 주정차 차량이 있어서 소방차가 못 들어와요.
• 공원 조명이 고장나서 밤에 너무 어두워 위험합니다.
• 이웃집에서 새벽에 심한 소음이 계속 납니다."
            maxlength="1000"></textarea>
          <span class="char-count" id="civil-char-count">0 / 1,000자</span>
        </div>

        <button class="btn btn-primary" id="civil-btn" style="width:100%; justify-content:center; padding:13px; margin-top:12px;">
          ✍️ 민원 작성하기
        </button>
      </div>
    </div>

    <!-- 결과 패널 -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">📄</span>
        작성된 민원
        <div id="civil-result-actions" style="display:none; margin-left:auto; gap:8px; display:none;">
          <button class="btn btn-secondary" onclick="copyCivil()" style="padding:5px 12px; font-size:0.82rem;">📋 복사</button>
          <button class="btn btn-secondary" onclick="saveCivil()" style="padding:5px 12px; font-size:0.82rem;">💾 저장</button>
        </div>
      </div>
      <div class="panel-body">
        <div id="civil-result">
          <div class="result-empty">
            <div class="empty-icon">✍️</div>
            <p>왼쪽에 상황을 설명하고<br><strong>민원 작성하기</strong>를 눌러주세요</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/civil.js"></script>
{% endblock %}
