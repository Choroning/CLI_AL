<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쉬운말 변환기 — 행정문서 쉽게 읽기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div>
    <h1>📋 쉬운말 변환기</h1>
    <p>행정문서 · 계약서 · 공문서를 누구나 이해할 수 있도록 변환합니다</p>
  </div>
</header>

<!-- ── 메인 ── -->
<div class="container">
  <div class="layout">

    <!-- 입력 패널 -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">✍️</span>
        문서 입력
      </div>
      <div class="panel-body">
        <textarea
          id="document-input"
          placeholder="정부 공문, 계약서, 약관, 의료 안내문 등을 여기에 붙여넣거나 파일로 업로드하세요.

예시:
제1조 (목적) 이 계약은 갑과 을 사이의 용역 제공에 관한 제반 사항을 규정함을 목적으로 한다..."
        ></textarea>

        <div class="input-actions">
          <button class="btn btn-upload" id="upload-btn">
            📁 파일 업로드 (.txt / .pdf / .hwp / .hwpx)
          </button>
          <input type="file" id="file-input" accept=".txt,.pdf,.hwp,.hwpx" style="display:none">

          <button class="btn btn-secondary" id="clear-btn">
            🗑️ 초기화
          </button>

          <span class="char-count" id="char-count">0 / 10,000자</span>
        </div>

        <div style="margin-top: 16px;">
          <button class="btn btn-primary" id="analyze-btn" disabled style="width:100%; justify-content:center; padding:13px;">
            🔄 쉬운말로 변환하기
          </button>
        </div>
      </div>
    </div>

    <!-- 결과 패널 -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">✅</span>
        변환 결과
        <div class="result-header-actions" id="result-header-actions" style="display:none; margin-left:auto; display:none; gap:8px;">
          <button class="btn btn-secondary" onclick="copyResult()" style="padding:5px 12px; font-size:0.82rem;">📋 복사</button>
          <button class="btn btn-secondary" onclick="saveResult()" style="padding:5px 12px; font-size:0.82rem;">💾 저장</button>
        </div>
      </div>
      <div class="panel-body">
        <div id="result-area">
          <div class="result-empty">
            <div class="empty-icon">📄</div>
            <p>왼쪽에 문서를 입력하고<br><strong>변환하기</strong>를 눌러주세요</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── 단어 풀이 모달 ── -->
<div class="tooltip-overlay" id="tooltip-overlay">
  <div class="tooltip-box">
    <button class="tooltip-close" id="tooltip-close">✕</button>
    <div class="tooltip-word" id="tooltip-word"></div>
    <div class="tooltip-explanation" id="tooltip-explanation"></div>
    <div class="tooltip-example" id="tooltip-example"></div>
  </div>
</div>

<!-- ── 로딩 ── -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">AI가 처리하고 있습니다...</div>
</div>

<!-- ── 토스트 ── -->
<div class="toast" id="toast"></div>

<script src="/static/js/main.js"></script>
</body>
</html>
